          <div class="stat-card">

            <div class="stat-label" data-i18n="about.stat2"></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">🤝</div>
            <div class="stat-label" data-i18n="about.stat3"></div>
          </div>
          <div class="stat-card">
            <div class="stat-icon">📊</div>
            <div class="stat-label" data-i18n="about.stat4"></div>

        <div class="service-card">

            <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">

            </svg>
          </div>
          <h3 data-i18n="svc1.title"></h3>
          <p  data-i18n="svc1.desc"></p>
          <ul class="service-list">
            <li data-i18n="svc1.li1"></li>

        </div>

        <div class="service-card service-card--featured">
          <div class="service-number">02</div>

          <h3 data-i18n="svc2.title"></h3>

          <ul class="service-list">

            <li data-i18n="svc2.li4"></li>

              <path d="M8 48 L20 32 L30 40 L42 20 L56 28" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

              <circle cx="30" cy="40" r="3" fill="currentColor"/>
              <circle cx="42" cy="20" r="3" fill="currentColor"/>

        <div class="strength-item">

          <h4 data-i18n="str4.title"></h4>

  <!-- Contact -->
  <section id="contact">
    <div class="container">
      <div class="section-header">
        <p class="section-label"  data-i18n="contact.label"></p>
        <h2 class="section-title" data-i18n="contact.title"></h2>
        <div class="section-divider"></div>
        <p class="contact-intro"  data-i18n="contact.intro"></p>
      </div>
      <div class="contact-grid">
        <div class="contact-info">
          <div class="contact-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                <circle cx="12" cy="10" r="3"/>
              </svg>
            </div>
            <div>
              <p class="contact-label" data-i18n="contact.addr.label"></p>
              <p class="contact-value" data-i18n="contact.addr.value"></p>
            </div>
          </div>
          <div class="contact-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </div>
            <div>
              <p class="contact-label" data-i18n="contact.email.label"></p>
              <p class="contact-value" id="contactEmail"></p>
            </div>
          </div>
          <div class="contact-item">
            <div class="contact-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.06 1.18 2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
              </svg>
            </div>
            <div>
              <p class="contact-label" data-i18n="contact.tel.label"></p>
              <p class="contact-value">0925-251-252</p>
            </div>
          </div>
          <div class="contact-languages">
            <p class="contact-label" data-i18n="contact.lang.label"></p>
            <div class="lang-tags">
              <span>繁體中文</span>
              <span>日本語</span>
              <span>English</span>
            </div>
          </div>
        </div>
        <form class="contact-form" id="contactForm">
          <div class="form-row">
            <div class="form-group">
              <label for="name" data-i18n="form.name.label"></label>
              <input type="text" id="name" data-i18n-placeholder="form.name.placeholder" required />
            </div>
            <div class="form-group">
              <label for="company" data-i18n="form.company.label"></label>
              <input type="text" id="company" data-i18n-placeholder="form.company.placeholder" />
            </div>
          </div>
          <div class="form-group">
            <label for="email" data-i18n="form.email.label"></label>
            <input type="email" id="email" placeholder="your@email.com" required />
          </div>
          <div class="form-group">
            <label for="service" data-i18n="form.service.label"></label>
            <select id="service">
              <option value="" disabled selected data-i18n="form.service.placeholder"></option>
              <option value="matching" data-i18n="form.service.opt1"></option>
              <option value="defense"  data-i18n="form.service.opt2"></option>
              <option value="market"   data-i18n="form.service.opt3"></option>
              <option value="other"    data-i18n="form.service.opt4"></option>
            </select>
          </div>
          <div class="form-group">
            <label for="message" data-i18n="form.message.label"></label>
            <textarea id="message" rows="5" data-i18n-placeholder="form.message.placeholder" required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-full" data-i18n="form.submit"></button>
          <p class="form-note" data-i18n="form.note"></p>
        </form>
      </div>
    </div>
  </section>
